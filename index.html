<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Thief Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            border: 3px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3), inset 0 0 30px rgba(0, 212, 255, 0.1);
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
        }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00d4ff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            font-family: 'Orbitron', monospace;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .stat-value {
            color: #00d4ff;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
        
        #weaponDisplay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
        }
        
        #weaponDisplay.uzi {
            border-color: #ff6600;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
        }
        
        #weaponDisplay.sweeping {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }
        
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .menu-title {
            font-family: 'Orbitron', monospace;
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #ff00ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            margin-bottom: 30px;
            animation: titlePulse 3s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .menu-button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            border-radius: 10px;
            margin: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .menu-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
        }
        
        .leaderboard {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .leaderboard h2 {
            font-family: 'Orbitron', monospace;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }
        
        .leaderboard-entry:nth-child(1) { border-left-color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .leaderboard-entry:nth-child(2) { border-left-color: #c0c0c0; background: rgba(192, 192, 192, 0.1); }
        .leaderboard-entry:nth-child(3) { border-left-color: #cd7f32; background: rgba(205, 127, 50, 0.1); }
        
        .medal {
            font-size: 24px;
            margin-left: 10px;
        }
        
        .level-complete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ff00;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 50;
            display: none;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
        }
        
        .level-complete h2 {
            font-family: 'Orbitron', monospace;
            color: #00ff00;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .medal-earned {
            font-size: 64px;
            margin: 20px 0;
            animation: medalBounce 1s ease infinite;
        }
        
        @keyframes medalBounce {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
        }
        
        .hidden { display: none !important; }
        
        #nameInput {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00d4ff;
            padding: 15px;
            font-size: 20px;
            color: #fff;
            border-radius: 8px;
            margin: 10px;
            font-family: 'Rajdhani', sans-serif;
            width: 300px;
            text-align: center;
        }
        
        #nameInput::placeholder {
            color: #666;
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #666;
            font-size: 14px;
            color: #aaa;
        }
        
        .controls-hint span {
            color: #00d4ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div class="ui-overlay">
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="levelDisplay">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Health</div>
                <div class="health-bar">
                    <div class="health-fill" id="healthBar" style="width: 100%"></div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Medal</div>
                <div class="stat-value" id="medalDisplay">-</div>
            </div>
        </div>
        
        <div id="weaponDisplay">
            <div class="stat-label">Weapon</div>
            <div class="stat-value" id="weaponName">PISTOL</div>
        </div>
        
        <div class="controls-hint">
            <span>WASD</span> Move | <span>MOUSE</span> Aim | <span>CLICK</span> Shoot | <span>E</span> Pickup Weapon
        </div>
        
        <div id="mainMenu" class="menu-screen">
            <h1 class="menu-title">TACTICAL THIEF HUNTER</h1>
            <input type="text" id="nameInput" placeholder="ENTER YOUR NAME" maxlength="15">
            <button class="menu-button" onclick="game.start()">START GAME</button>
            <button class="menu-button" onclick="game.showLeaderboard()">LEADERBOARD</button>
        </div>
        
        <div id="leaderboardScreen" class="menu-screen hidden">
            <div class="leaderboard">
                <h2>🏆 TOP HUNTERS 🏆</h2>
                <div id="leaderboardList"></div>
                <button class="menu-button" onclick="game.showMainMenu()" style="margin-top: 20px;">BACK</button>
            </div>
        </div>
        
        <div id="levelComplete" class="level-complete">
            <h2>LEVEL COMPLETE!</h2>
            <p style="font-size: 24px; margin: 10px 0;">Score: <span id="levelScore">0</span></p>
            <div id="medalEarned" class="medal-earned"></div>
            <p id="medalText" style="font-size: 18px; color: #ffd700;"></p>
            <button class="menu-button" onclick="game.nextLevel()" style="margin-top: 20px;">NEXT LEVEL</button>
        </div>
        
        <div id="gameOver" class="menu-screen hidden">
            <h1 class="menu-title" style="color: #ff3333; -webkit-text-fill-color: #ff3333;">GAME OVER</h1>
            <p style="font-size: 32px; margin: 20px;">Final Score: <span id="finalScore" style="color: #00d4ff;">0</span></p>
            <div id="finalMedal" style="font-size: 48px; margin: 20px;"></div>
            <button class="menu-button" onclick="game.restart()">TRY AGAIN</button>
            <button class="menu-button" onclick="game.showMainMenu()">MAIN MENU</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        class Game {
            constructor() {
                this.player = null;
                this.thieves = [];
                this.bullets = [];
                this.particles = [];
                this.weaponDrops = [];
                this.currentLevel = 1;
                this.score = 0;
                this.maxLevels = 15;
                this.gameRunning = false;
                this.keys = {};
                this.mouse = { x: 0, y: 0, down: false };
                this.camera = { x: 0, y: 0 };
                this.leaderboard = JSON.parse(localStorage.getItem('thiefHunterLeaderboard') || '[]');
                this.playerName = '';
                
                this.setupInputs();
                this.loop = this.loop.bind(this);
            }
            
            setupInputs() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    if (e.key.toLowerCase() === 'e') this.tryPickupWeapon();
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
                
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    this.mouse.x = e.clientX - rect.left;
                    this.mouse.y = e.clientY - rect.top;
                });
                
                canvas.addEventListener('mousedown', () => {
                    this.mouse.down = true;
                    if (this.player) this.player.shoot();
                });
                
                canvas.addEventListener('mouseup', () => {
                    this.mouse.down = false;
                });
            }
            
            start() {
                const nameInput = document.getElementById('nameInput').value.trim();
                this.playerName = nameInput || 'Anonymous';
                
                document.getElementById('mainMenu').classList.add('hidden');
                document.getElementById('gameOver').classList.add('hidden');
                
                this.currentLevel = 1;
                this.score = 0;
                this.initLevel();
                this.gameRunning = true;
                requestAnimationFrame(this.loop);
            }
            
            initLevel() {
                this.player = new Player(600, 400, this);
                this.thieves = [];
                this.bullets = [];
                this.particles = [];
                this.weaponDrops = [];
                
                const config = this.getLevelConfig(this.currentLevel);
                
                // Spawn normal thieves
                for (let i = 0; i < config.normal; i++) {
                    const angle = (Math.PI * 2 * i) / config.normal;
                    const dist = 300 + Math.random() * 200;
                    const x = 600 + Math.cos(angle) * dist;
                    const y = 400 + Math.sin(angle) * dist;
                    this.thieves.push(new Thief(x, y, 'normal', this));
                }
                
                // Spawn armed thieves
                for (let i = 0; i < config.armed; i++) {
                    const angle = (Math.PI * 2 * i) / config.armed + Math.PI;
                    const dist = 350 + Math.random() * 150;
                    const x = 600 + Math.cos(angle) * dist;
                    const y = 400 + Math.sin(angle) * dist;
                    this.thieves.push(new Thief(x, y, 'armed', this));
                }
                
                // Spawn bosses
                if (config.uziBoss) {
                    this.thieves.push(new Thief(600, 200, 'uzi', this));
                }
                if (config.sweepingBoss) {
                    this.thieves.push(new Thief(600, 200, 'sweeping', this));
                }
                
                this.updateUI();
            }
            
            getLevelConfig(level) {
                const configs = [
                    { normal: 1, armed: 0, uziBoss: false, sweepingBoss: false },
                    { normal: 2, armed: 0, uziBoss: false, sweepingBoss: false },
                    { normal: 3, armed: 0, uziBoss: false, sweepingBoss: false },
                    { normal: 4, armed: 0, uziBoss: false, sweepingBoss: false },
                    { normal: 5, armed: 0, uziBoss: false, sweepingBoss: false },
                    { normal: 6, armed: 0, uziBoss: false, sweepingBoss: false },
                    { normal: 5, armed: 1, uziBoss: false, sweepingBoss: false },
                    { normal: 4, armed: 2, uziBoss: false, sweepingBoss: false },
                    { normal: 3, armed: 3, uziBoss: false, sweepingBoss: false },
                    { normal: 2, armed: 4, uziBoss: true, sweepingBoss: false },
                    { normal: 0, armed: 4, uziBoss: true, sweepingBoss: false }, // 2 uzi treated as uziBoss
                    { normal: 0, armed: 3, uziBoss: true, sweepingBoss: false }, // 3 uzi
                    { normal: 0, armed: 2, uziBoss: true, sweepingBoss: false }, // 4 uzi
                    { normal: 0, armed: 1, uziBoss: true, sweepingBoss: false }, // 5 uzi
                    { normal: 0, armed: 0, uziBoss: false, sweepingBoss: true }
                ];
                
                // Adjust for levels 11-14 (multiple uzi thieves, not bosses)
                if (level >= 11 && level <= 14) {
                    const uziCount = level - 9; // 2, 3, 4, 5
                    return {
                        normal: 0,
                        armed: configs[level - 1].armed,
                        uziBoss: false,
                        sweepingBoss: false,
                        extraUzi: uziCount
                    };
                }
                
                return configs[level - 1] || configs[14];
            }
            
            loop() {
                if (!this.gameRunning) return;
                
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                // Update and draw entities
                this.player.update();
                this.player.draw();
                
                // Update thieves
                for (let i = this.thieves.length - 1; i >= 0; i--) {
                    const thief = this.thieves[i];
                    thief.update();
                    thief.draw();
                    
                    if (thief.dead) {
                        this.createExplosion(thief.x, thief.y, thief.color);
                        this.spawnWeaponDrop(thief);
                        this.thieves.splice(i, 1);
                        this.addScore(thief.getScoreValue());
                    }
                }
                
                // Update bullets
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];
                    bullet.update();
                    bullet.draw();
                    
                    if (bullet.life <= 0 || 
                        bullet.x < 0 || bullet.x > canvas.width ||
                        bullet.y < 0 || bullet.y > canvas.height) {
                        this.bullets.splice(i, 1);
                    }
                }
                
                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.update();
                    p.draw();
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
                
                // Update weapon drops
                for (let i = this.weaponDrops.length - 1; i >= 0; i--) {
                    const drop = this.weaponDrops[i];
                    drop.update();
                    drop.draw();
                    if (drop.life <= 0) this.weaponDrops.splice(i, 1);
                }
                
                // Check level complete
                if (this.thieves.length === 0 && this.gameRunning) {
                    this.levelComplete();
                }
                
                // Check game over
                if (this.player.health <= 0) {
                    this.gameOver();
                }
                
                this.updateUI();
                requestAnimationFrame(this.loop);
            }
            
            spawnWeaponDrop(thief) {
                if (thief.type === 'uzi' || thief.type === 'sweeping') {
                    this.weaponDrops.push(new WeaponDrop(thief.x, thief.y, thief.type, this));
                }
            }
            
            tryPickupWeapon() {
                for (let drop of this.weaponDrops) {
                    const dist = Math.hypot(this.player.x - drop.x, this.player.y - drop.y);
                    if (dist < 40) {
                        this.player.equipWeapon(drop.type);
                        drop.pickedUp = true;
                        break;
                    }
                }
            }
            
            createExplosion(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    this.particles.push(new Particle(x, y, color, this));
                }
            }
            
            addScore(points) {
                this.score += points;
            }
            
            getMedal() {
                if (this.score >= 100000) return { icon: '💎', name: 'Diamond', color: '#b9f2ff' };
                if (this.score >= 50000) return { icon: '🥇', name: 'Gold', color: '#ffd700' };
                if (this.score >= 30000) return { icon: '🥈', name: 'Silver', color: '#c0c0c0' };
                if (this.score >= 10000) return { icon: '🥉', name: 'Bronze', color: '#cd7f32' };
                return { icon: '-', name: 'None', color: '#888' };
            }
            
            levelComplete() {
                this.gameRunning = false;
                const medal = this.getMedal();
                
                document.getElementById('levelScore').textContent = this.score;
                document.getElementById('medalEarned').textContent = medal.icon;
                document.getElementById('medalText').textContent = medal.name !== 'None' ? `${medal.name} Medal Earned!` : 'Keep going!';
                document.getElementById('medalText').style.color = medal.color;
                
                document.getElementById('levelComplete').style.display = 'block';
            }
            
            nextLevel() {
                document.getElementById('levelComplete').style.display = 'none';
                
                if (this.currentLevel >= this.maxLevels) {
                    this.victory();
                } else {
                    this.currentLevel++;
                    this.initLevel();
                    this.gameRunning = true;
                    requestAnimationFrame(this.loop);
                }
            }
            
            victory() {
                this.saveScore();
                alert(`Congratulations! You've completed all 15 levels!\nFinal Score: ${this.score}\nMedal: ${this.getMedal().icon}`);
                this.showMainMenu();
            }
            
            gameOver() {
                this.gameRunning = false;
                this.saveScore();
                
                const medal = this.getMedal();
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalMedal').textContent = medal.icon;
                document.getElementById('finalMedal').style.color = medal.color;
                
                document.getElementById('gameOver').classList.remove('hidden');
            }
            
            saveScore() {
                const entry = {
                    name: this.playerName,
                    score: this.score,
                    medal: this.getMedal().icon,
                    date: new Date().toLocaleDateString()
                };
                
                this.leaderboard.push(entry);
                this.leaderboard.sort((a, b) => b.score - a.score);
                this.leaderboard = this.leaderboard.slice(0, 10);
                
                localStorage.setItem('thiefHunterLeaderboard', JSON.stringify(this.leaderboard));
            }
            
            showLeaderboard() {
                const list = document.getElementById('leaderboardList');
                list.innerHTML = '';
                
                this.leaderboard.forEach((entry, index) => {
                    const div = document.createElement('div');
                    div.className = 'leaderboard-entry';
                    div.innerHTML = `
                        <span style="font-weight: bold; color: #00d4ff;">${index + 1}. ${entry.name}</span>
                        <span style="color: #fff; font-family: 'Orbitron', monospace;">${entry.score} <span class="medal">${entry.medal}</span></span>
                    `;
                    list.appendChild(div);
                });
                
                if (this.leaderboard.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No scores yet. Be the first!</p>';
                }
                
                document.getElementById('mainMenu').classList.add('hidden');
                document.getElementById('leaderboardScreen').classList.remove('hidden');
            }
            
            showMainMenu() {
                document.getElementById('gameOver').classList.add('hidden');
                document.getElementById('leaderboardScreen').classList.add('hidden');
                document.getElementById('levelComplete').style.display = 'none';
                document.getElementById('mainMenu').classList.remove('hidden');
                this.gameRunning = false;
            }
            
            restart() {
                document.getElementById('gameOver').classList.add('hidden');
                this.currentLevel = 1;
                this.score = 0;
                this.initLevel();
                this.gameRunning = true;
                requestAnimationFrame(this.loop);
            }
            
            updateUI() {
                document.getElementById('levelDisplay').textContent = this.currentLevel;
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('healthBar').style.width = (this.player.health / this.player.maxHealth * 100) + '%';
                
                const medal = this.getMedal();
                document.getElementById('medalDisplay').textContent = medal.icon;
                document.getElementById('medalDisplay').style.color = medal.color;
            }
        }
        
        class Player {
            constructor(x, y, game) {
                this.x = x;
                this.y = y;
                this.game = game;
                this.radius = 20;
                this.speed = 5;
                this.health = 100;
                this.maxHealth = 100;
                this.weapon = 'pistol';
                this.lastShot = 0;
                this.shootDelay = 250;
                this.color = '#00d4ff';
            }
            
            update() {
                // Movement
                let dx = 0;
                let dy = 0;
                
                if (this.game.keys['w']) dy -= 1;
                if (this.game.keys['s']) dy += 1;
                if (this.game.keys['a']) dx -= 1;
                if (this.game.keys['d']) dx += 1;
                
                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }
                
                this.x += dx * this.speed;
                this.y += dy * this.speed;
                
                // Boundaries
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
            }
            
            draw() {
                // Draw player
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Draw aim line
                const angle = Math.atan2(this.game.mouse.y - this.y, this.game.mouse.x - this.x);
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + Math.cos(angle) * 50, this.y + Math.sin(angle) * 50);
                ctx.stroke();
            }
            
            shoot() {
                const now = Date.now();
                if (now - this.lastShot < this.shootDelay) return;
                
                const angle = Math.atan2(this.game.mouse.y - this.y, this.game.mouse.x - this.x);
                
                if (this.weapon === 'pistol') {
                    this.game.bullets.push(new Bullet(this.x, this.y, angle, 'player', 8, '#00d4ff', this.game));
                    this.lastShot = now;
                } else if (this.weapon === 'uzi') {
                    this.game.bullets.push(new Bullet(this.x, this.y, angle, 'player', 12, '#ff6600', this.game));
                    this.lastShot = now - 150; // Faster fire rate
                } else if (this.weapon === 'sweeping') {
                    // Fire 3 bullets in spread
                    for (let i = -1; i <= 1; i++) {
                        const spreadAngle = angle + i * 0.3;
                        this.game.bullets.push(new Bullet(this.x, this.y, spreadAngle, 'player', 10, '#ff00ff', this.game));
                    }
                    this.lastShot = now;
                }
            }
            
            equipWeapon(type) {
                this.weapon = type;
                if (type === 'uzi') {
                    this.shootDelay = 100;
                    document.getElementById('weaponDisplay').className = 'uzi';
                    document.getElementById('weaponName').textContent = 'UZI';
                    document.getElementById('weaponName').style.color = '#ff6600';
                } else if (type === 'sweeping') {
                    this.shootDelay = 400;
                    document.getElementById('weaponDisplay').className = 'sweeping';
                    document.getElementById('weaponName').textContent = 'SWEEPER';
                    document.getElementById('weaponName').style.color = '#ff00ff';
                }
            }
            
            takeDamage(damage) {
                this.health -= damage;
                if (this.health < 0) this.health = 0;
                
                // Screen shake effect
                canvas.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                setTimeout(() => canvas.style.transform = '', 100);
            }
        }
        
        class Thief {
            constructor(x, y, type, game) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.game = game;
                this.dead = false;
                
                // Stats based on type
                if (type === 'normal') {
                    this.health = 30;
                    this.speed = 2;
                    this.color = '#ff3333';
                    this.radius = 18;
                    this.shootDelay = 2000;
                    this.canShoot = false;
                } else if (type === 'armed') {
                    this.health = 50;
                    this.speed = 2.5;
                    this.color = '#ff6600';
                    this.radius = 20;
                    this.shootDelay = 1500;
                    this.canShoot = true;
                } else if (type === 'uzi') {
                    this.health = 150;
                    this.speed = 3;
                    this.color = '#ff00ff';
                    this.radius = 25;
                    this.shootDelay = 200;
                    this.canShoot = true;
                } else if (type === 'sweeping') {
                    this.health = 200;
                    this.speed = 2.8;
                    this.color = '#ffd700';
                    this.radius = 28;
                    this.shootDelay = 800;
                    this.canShoot = true;
                }
                
                this.maxHealth = this.health;
                this.lastShot = 0;
                this.fleeDistance = type === 'normal' ? 150 : 250;
                this.tacticalTimer = 0;
                this.strafeDir = Math.random() > 0.5 ? 1 : -1;
            }
            
            update() {
                const dx = this.game.player.x - this.x;
                const dy = this.game.player.y - this.y;
                const dist = Math.hypot(dx, dy);
                const angle = Math.atan2(dy, dx);
                
                // AI Behavior
                if (this.type === 'normal') {
                    // Run away from player
                    if (dist < this.fleeDistance) {
                        this.x -= Math.cos(angle) * this.speed;
                        this.y -= Math.sin(angle) * this.speed;
                    } else {
                        // Circle strafe at distance
                        this.x += Math.cos(angle + Math.PI / 2) * this.speed * 0.5;
                        this.y += Math.sin(angle + Math.PI / 2) * this.speed * 0.5;
                    }
                } else {
                    // Tactical behavior for armed enemies
                    this.tacticalTimer++;
                    
                    if (dist < this.fleeDistance) {
                        // Too close - back up while shooting
                        this.x -= Math.cos(angle) * this.speed * 0.8;
                        this.y -= Math.sin(angle) * this.speed * 0.8;
                    } else if (dist > 400) {
                        // Too far - approach
                        this.x += Math.cos(angle) * this.speed;
                        this.y += Math.sin(angle) * this.speed;
                    } else {
                        // Optimal range - strafe tactically
                        if (this.tacticalTimer % 60 === 0) {
                            this.strafeDir = Math.random() > 0.5 ? 1 : -1;
                        }
                        this.x += Math.cos(angle + Math.PI / 2) * this.speed * this.strafeDir;
                        this.y += Math.sin(angle + Math.PI / 2) * this.speed * this.strafeDir;
                    }
                    
                    // Shoot at player
                    const now = Date.now();
                    if (now - this.lastShot > this.shootDelay && this.canShoot) {
                        this.shoot(angle);
                        this.lastShot = now;
                    }
                }
                
                // Keep in bounds
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                
                // Check bullet collisions
                for (let bullet of this.game.bullets) {
                    if (bullet.owner === 'player') {
                        const bdist = Math.hypot(this.x - bullet.x, this.y - bullet.y);
                        if (bdist < this.radius + bullet.radius) {
                            this.health -= bullet.damage;
                            bullet.life = 0;
                            this.game.createExplosion(bullet.x, bullet.y, '#fff');
                            
                            if (this.health <= 0) {
                                this.dead = true;
                            }
                        }
                    }
                }
            }
            
            draw() {
                // Draw thief
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Draw health bar
                const barWidth = 40;
                const barHeight = 6;
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.radius - 15, barWidth, barHeight);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.radius - 15, barWidth * (this.health / this.maxHealth), barHeight);
                
                // Draw money bag indicator for normal thieves
                if (this.type === 'normal') {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = '20px Arial';
                    ctx.fillText('💰', this.x - 10, this.y - 30);
                }
                
                // Draw weapon indicator
                if (this.type === 'armed') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px Arial';
                    ctx.fillText('🔫', this.x - 8, this.y - 35);
                } else if (this.type === 'uzi') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px Arial';
                    ctx.fillText('🔥', this.x - 10, this.y - 40);
                } else if (this.type === 'sweeping') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px Arial';
                    ctx.fillText('⚡', this.x - 12, this.y - 45);
                }
            }
            
            shoot(angle) {
                // Add some inaccuracy
                const inaccuracy = (Math.random() - 0.5) * 0.2;
                
                if (this.type === 'sweeping') {
                    // Boss fires 3 bullets
                    for (let i = -1; i <= 1; i++) {
                        this.game.bullets.push(new Bullet(
                            this.x, this.y, 
                            angle + i * 0.4 + inaccuracy, 
                            'enemy', 
                            8, 
                            '#ffd700', 
                            this.game,
                            15
                        ));
                    }
                } else {
                    this.game.bullets.push(new Bullet(
                        this.x, this.y, 
                        angle + inaccuracy, 
                        'enemy', 
                        this.type === 'uzi' ? 12 : 7, 
                        this.color, 
                        this.game,
                        this.type === 'uzi' ? 10 : 20
                    ));
                }
            }
            
            getScoreValue() {
                switch(this.type) {
                    case 'normal': return 1000;
                    case 'armed': return 2000;
                    case 'uzi': return 3000;
                    case 'sweeping': return 5000;
                    default: return 1000;
                }
            }
        }
        
        class Bullet {
            constructor(x, y, angle, owner, speed, color, game, damage = 10) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.owner = owner;
                this.speed = speed;
                this.color = color;
                this.game = game;
                this.damage = damage;
                this.radius = 4;
                this.life = 100;
            }
            
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life--;
                
                // Check collision with player
                if (this.owner === 'enemy') {
                    const dist = Math.hypot(this.x - this.game.player.x, this.y - this.game.player.y);
                    if (dist < this.game.player.radius + this.radius) {
                        this.game.player.takeDamage(this.damage);
                        this.life = 0;
                        this.game.createExplosion(this.x, this.y, '#ff0000');
                    }
                }
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Trail
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - Math.cos(this.angle) * 20, this.y - Math.sin(this.angle) * 20);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
        
        class Particle {
            constructor(x, y, color, game) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.game = game;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 2;
                this.life = 30;
                this.size = Math.random() * 4 + 2;
            }
            
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life--;
                this.size *= 0.95;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 30;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        class WeaponDrop {
            constructor(x, y, type, game) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.game = game;
                this.life = 600; // 10 seconds at 60fps
                this.pickedUp = false;
                this.bobOffset = 0;
            }
            
            update() {
                this.life--;
                this.bobOffset += 0.1;
                
                if (this.pickedUp) {
                    this.life = 0;
                }
            }
            
            draw() {
                if (this.pickedUp) return;
                
                const y = this.y + Math.sin(this.bobOffset) * 5;
                
                // Glow effect
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.type === 'uzi' ? '#ff6600' : '#ff00ff';
                
                // Weapon box
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.strokeStyle = this.type === 'uzi' ? '#ff6600' : '#ff00ff';
                ctx.lineWidth = 3;
                ctx.fillRect(this.x - 25, y - 20, 50, 40);
                ctx.strokeRect(this.x - 25, y - 20, 50, 40);
                
                ctx.shadowBlur = 0;
                
                // Icon
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.type === 'uzi' ? 'UZI' : 'SWEEP', this.x, y + 5);
                
                // Pickup hint
                if (this.life % 60 < 30) {
                    ctx.fillStyle = '#0f0';
                    ctx.font = '12px Arial';
                    ctx.fillText('[E]', this.x, y - 30);
                }
                
                ctx.textAlign = 'left';
            }
        }
        
        const game = new Game();
    </script>
