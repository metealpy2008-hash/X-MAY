<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL THIEF HUNTER - Official Trailer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Orbitron', monospace;
        }
        
        #trailerContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #000 100%);
        }
        
        #trailerCanvas {
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
            border: 2px solid #00d4ff;
        }
        
        .overlay-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 14px;
            z-index: 10;
        }
        
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        
        button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
        }
        
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .skip-btn {
            background: transparent;
            border: 2px solid #ff3333;
            color: #ff3333;
        }
        
        .skip-btn:hover {
            background: #ff3333;
            color: #000;
        }
        
        #recordingStatus {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff3333;
            font-size: 14px;
            display: none;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #00d4ff;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div id="trailerContainer">
        <canvas id="trailerCanvas" width="1280" height="720"></canvas>
        <div class="overlay-ui">TRAILER MODE | 60 FPS CINEMATIC</div>
        <div id="recordingStatus">● REC</div>
        <div class="progress-bar" id="progressBar"></div>
        
        <div class="controls">
            <button id="playBtn" onclick="trailer.play()">▶ Play Trailer</button>
            <button id="recordBtn" onclick="trailer.startRecording()">⏺ Record MP4</button>
            <button class="skip-btn" onclick="trailer.skip()">Skip ⏭</button>
        </div>
    </div>

    <script>
        // Canvas and Context Setup
        const canvas = document.getElementById('trailerCanvas');
        const ctx = canvas.getContext('2d');
        
        // Trailer System
        class TrailerSystem {
            constructor() {
                this.scenes = [];
                this.currentScene = 0;
                this.frameCount = 0;
                this.isPlaying = false;
                this.isRecording = false;
                this.mediaRecorder = null;
                this.recordedChunks = [];
                this.autoPlay = true;
                
                // Cinematic camera
                this.camera = {
                    x: 0,
                    y: 0,
                    zoom: 1,
                    shake: 0,
                    targetX: 0,
                    targetY: 0
                };
                
                // Game simulation for trailer
                this.simulatedGame = {
                    player: { x: 640, y: 360, health: 100, weapon: 'pistol' },
                    enemies: [],
                    bullets: [],
                    particles: [],
                    score: 0,
                    level: 1
                };
                
                this.setupScenes();
                this.loop = this.loop.bind(this);
            }
            
            setupScenes() {
                // Scene 1: Title Card with dramatic zoom
                this.scenes.push({
                    duration: 180,
                    type: 'title',
                    text: 'TACTICAL THIEF HUNTER',
                    subtext: 'PREPARE FOR COMBAT',
                    zoom: 0.8,
                    targetZoom: 1.2
                });
                
                // Scene 2: Gameplay - Level 1 (Normal thieves)
                this.scenes.push({
                    duration: 300,
                    type: 'gameplay',
                    level: 1,
                    description: 'TACTICAL ENEMIES',
                    spawnEnemies: [
                        { type: 'normal', count: 3, delay: 60 },
                        { type: 'normal', count: 2, delay: 120 }
                    ],
                    cameraStyle: 'follow_player'
                });
                
                // Scene 3: Slow-motion kill shot
                this.scenes.push({
                    duration: 120,
                    type: 'slowmo',
                    description: 'PRECISION ELIMINATION',
                    zoom: 1.5
                });
                
                // Scene 4: Weapon pickup showcase
                this.scenes.push({
                    duration: 180,
                    type: 'weapon_showcase',
                    weapon: 'uzi',
                    text: 'UZI ACQUIRED',
                    subtext: 'RAPID FIRE UNLEASHED'
                });
                
                // Scene 5: Intense combat with Uzi
                this.scenes.push({
                    duration: 240,
                    type: 'gameplay',
                    level: 7,
                    description: 'AUTOMATIC WEAPONS',
                    spawnEnemies: [
                        { type: 'armed', count: 3, delay: 40 },
                        { type: 'normal', count: 4, delay: 80 }
                    ],
                    autoShoot: true,
                    cameraStyle: 'dynamic'
                });
                
                // Scene 6: Boss introduction
                this.scenes.push({
                    duration: 200,
                    type: 'boss_intro',
                    bossType: 'uzi',
                    text: 'BOSS APPROACHING',
                    subtext: 'EXTREME DANGER'
                });
                
                // Scene 7: Epic boss battle
                this.scenes.push({
                    duration: 360,
                    type: 'gameplay',
                    level: 10,
                    description: 'BOSS BATTLE',
                    spawnEnemies: [
                        { type: 'uzi', count: 1, delay: 0, isBoss: true },
                        { type: 'armed', count: 4, delay: 60 }
                    ],
                    cameraStyle: 'boss_focus',
                    screenShake: true
                });
                
                // Scene 8: Sweeping weapon showcase
                this.scenes.push({
                    duration: 180,
                    type: 'weapon_showcase',
                    weapon: 'sweeping',
                    text: 'SWEEPER CANNON',
                    subtext: 'TRIPLE SHOT DESTRUCTION'
                });
                
                // Scene 9: Final level chaos
                this.scenes.push({
                    duration: 300,
                    type: 'gameplay',
                    level: 15,
                    description: 'MAXIMUM CHAOS',
                    spawnEnemies: [
                        { type: 'sweeping', count: 1, delay: 0, isBoss: true },
                        { type: 'uzi', count: 3, delay: 40 },
                        { type: 'armed', count: 2, delay: 80 }
                    ],
                    autoShoot: true,
                    cameraStyle: 'chaos',
                    screenShake: true
                });
                
                // Scene 10: Medal showcase
                this.scenes.push({
                    duration: 150,
                    type: 'medal_showcase',
                    medals: ['🥉', '🥈', '🥇', '💎'],
                    text: 'EARN YOUR GLORY'
                });
                
                // Scene 11: Final title card
                this.scenes.push({
                    duration: 240,
                    type: 'title',
                    text: 'PLAY NOW',
                    subtext: '15 LEVELS • 4 WEAPONS • LEADERBOARD',
                    zoom: 1.0,
                    targetZoom: 1.3,
                    final: true
                });
            }
            
            play() {
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.currentScene = 0;
                this.frameCount = 0;
                document.getElementById('playBtn').disabled = true;
                document.getElementById('playBtn').textContent = 'Playing...';
                requestAnimationFrame(this.loop);
            }
            
            startRecording() {
                if (this.isRecording) return;
                
                const stream = canvas.captureStream(60);
                this.mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 5000000
                });
                
                this.recordedChunks = [];
                this.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) this.recordedChunks.push(e.data);
                };
                
                this.mediaRecorder.onstop = () => {
                    const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Tactical_Thief_Hunter_Trailer.webm';
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    document.getElementById('recordingStatus').style.display = 'none';
                    document.getElementById('recordBtn').disabled = false;
                    document.getElementById('recordBtn').textContent = '⏺ Record MP4';
                };
                
                this.mediaRecorder.start();
                this.isRecording = true;
                document.getElementById('recordingStatus').style.display = 'block';
                document.getElementById('recordBtn').disabled = true;
                document.getElementById('recordBtn').textContent = 'Recording...';
                
                if (!this.isPlaying) this.play();
            }
            
            skip() {
                this.currentScene++;
                this.frameCount = 0;
                if (this.currentScene >= this.scenes.length) {
                    this.endTrailer();
                }
            }
            
            endTrailer() {
                this.isPlaying = false;
                if (this.isRecording && this.mediaRecorder) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                }
                document.getElementById('playBtn').disabled = false;
                document.getElementById('playBtn').textContent = '▶ Replay Trailer';
                
                // Reset for replay
                this.currentScene = 0;
                this.frameCount = 0;
                this.simulatedGame = {
                    player: { x: 640, y: 360, health: 100, weapon: 'pistol' },
                    enemies: [],
                    bullets: [],
                    particles: [],
                    score: 0,
                    level: 1
                };
            }
            
            updateCamera() {
                const scene = this.scenes[this.currentScene];
                const cam = this.camera;
                
                // Smooth camera movement
                cam.x += (cam.targetX - cam.x) * 0.1;
                cam.y += (cam.targetY - cam.y) * 0.1;
                
                // Zoom transitions
                if (scene.targetZoom) {
                    cam.zoom += (scene.targetZoom - cam.zoom) * 0.02;
                }
                
                // Screen shake decay
                if (cam.shake > 0) {
                    cam.x += (Math.random() - 0.5) * cam.shake;
                    cam.y += (Math.random() - 0.5) * cam.shake;
                    cam.shake *= 0.9;
                }
            }
            
            spawnEnemy(type, isBoss = false) {
                const angle = Math.random() * Math.PI * 2;
                const dist = isBoss ? 300 : 200 + Math.random() * 200;
                const x = this.simulatedGame.player.x + Math.cos(angle) * dist;
                const y = this.simulatedGame.player.y + Math.sin(angle) * dist;
                
                this.simulatedGame.enemies.push({
                    x, y,
                    type,
                    health: type === 'normal' ? 30 : type === 'armed' ? 50 : type === 'uzi' ? 150 : 200,
                    maxHealth: type === 'normal' ? 30 : type === 'armed' ? 50 : type === 'uzi' ? 150 : 200,
                    radius: type === 'normal' ? 18 : type === 'armed' ? 20 : type === 'uzi' ? 25 : 28,
                    color: type === 'normal' ? '#ff3333' : type === 'armed' ? '#ff6600' : type === 'uzi' ? '#ff00ff' : '#ffd700',
                    vx: 0, vy: 0,
                    dead: false
                });
            }
            
            updateGameplay() {
                const game = this.simulatedGame;
                const scene = this.scenes[this.currentScene];
                
                // Spawn enemies based on scene config
                if (scene.spawnEnemies && this.frameCount < 180) {
                    scene.spawnEnemies.forEach(spawn => {
                        if (this.frameCount === spawn.delay) {
                            for (let i = 0; i < spawn.count; i++) {
                                setTimeout(() => this.spawnEnemy(spawn.type, spawn.isBoss), i * 200);
                            }
                        }
                    });
                }
                
                // Auto-shoot logic
                if (scene.autoShoot && game.enemies.length > 0) {
                    const nearest = game.enemies.reduce((prev, curr) => {
                        const prevDist = Math.hypot(prev.x - game.player.x, prev.y - game.player.y);
                        const currDist = Math.hypot(curr.x - game.player.x, curr.y - game.player.y);
                        return currDist < prevDist ? curr : prev;
                    });
                    
                    if (this.frameCount % (game.player.weapon === 'uzi' ? 6 : game.player.weapon === 'sweeping' ? 24 : 15) === 0) {
                        this.shootBullet(game.player.x, game.player.y, nearest.x, nearest.y, 'player', game.player.weapon);
                    }
                }
                
                // Update enemies (AI)
                game.enemies.forEach(enemy => {
                    if (enemy.dead) return;
                    
                    const dx = game.player.x - enemy.x;
                    const dy = game.player.y - enemy.y;
                    const dist = Math.hypot(dx, dy);
                    const angle = Math.atan2(dy, dx);
                    
                    // Movement
                    if (enemy.type === 'normal') {
                        if (dist < 150) {
                            enemy.x -= Math.cos(angle) * 2;
                            enemy.y -= Math.sin(angle) * 2;
                        }
                    } else {
                        // Tactical movement
                        enemy.x += Math.cos(angle + Math.PI/2) * (enemy.type === 'uzi' ? 3 : 2.5);
                        enemy.y += Math.sin(angle + Math.PI/2) * (enemy.type === 'uzi' ? 3 : 2.5);
                        
                        // Enemy shooting
                        if (this.frameCount % (enemy.type === 'uzi' ? 12 : enemy.type === 'sweeping' ? 48 : 90) === 0) {
                            this.shootBullet(enemy.x, enemy.y, game.player.x, game.player.y, 'enemy', enemy.type);
                        }
                    }
                    
                    // Keep in bounds
                    enemy.x = Math.max(50, Math.min(1230, enemy.x));
                    enemy.y = Math.max(50, Math.min(670, enemy.y));
                });
                
                // Update bullets
                game.bullets = game.bullets.filter(bullet => {
                    bullet.x += Math.cos(bullet.angle) * bullet.speed;
                    bullet.y += Math.sin(bullet.angle) * bullet.speed;
                    bullet.life--;
                    
                    // Collision with enemies
                    if (bullet.owner === 'player') {
                        game.enemies.forEach(enemy => {
                            if (!enemy.dead && Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y) < enemy.radius + 5) {
                                enemy.health -= 10;
                                bullet.life = 0;
                                this.createParticles(enemy.x, enemy.y, enemy.color, 5);
                                
                                if (enemy.health <= 0) {
                                    enemy.dead = true;
                                    this.createParticles(enemy.x, enemy.y, enemy.color, 15);
                                    game.score += enemy.type === 'normal' ? 1000 : enemy.type === 'armed' ? 2000 : enemy.type === 'uzi' ? 3000 : 5000;
                                    
                                    // Screen shake on kill
                                    if (scene.screenShake) this.camera.shake = 10;
                                }
                            }
                        });
                    }
                    
                    return bullet.life > 0 && bullet.x > 0 && bullet.x < 1280 && bullet.y > 0 && bullet.y < 720;
                });
                
                // Remove dead enemies
                game.enemies = game.enemies.filter(e => !e.dead);
                
                // Update particles
                game.particles = game.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    p.size *= 0.95;
                    return p.life > 0;
                });
                
                // Camera follow
                if (scene.cameraStyle === 'follow_player') {
                    this.camera.targetX = (640 - game.player.x) * 0.3;
                    this.camera.targetY = (360 - game.player.y) * 0.3;
                } else if (scene.cameraStyle === 'boss_focus' && game.enemies.length > 0) {
                    const boss = game.enemies.find(e => e.type === 'uzi' || e.type === 'sweeping') || game.enemies[0];
                    if (boss) {
                        this.camera.targetX = (640 - (game.player.x + boss.x) / 2) * 0.5;
                        this.camera.targetY = (360 - (game.player.y + boss.y) / 2) * 0.5;
                    }
                } else if (scene.cameraStyle === 'chaos') {
                    this.camera.targetX = (Math.random() - 0.5) * 50;
                    this.camera.targetY = (Math.random() - 0.5) * 50;
                }
            }
            
            shootBullet(x, y, targetX, targetY, owner, weaponType) {
                const angle = Math.atan2(targetY - y, targetX - x);
                const game = this.simulatedGame;
                
                if (weaponType === 'sweeping' && owner === 'player') {
                    // Triple shot
                    for (let i = -1; i <= 1; i++) {
                        game.bullets.push({
                            x, y,
                            angle: angle + i * 0.3,
                            speed: 10,
                            life: 60,
                            owner,
                            color: '#ff00ff',
                            size: 4
                        });
                    }
                } else {
                    game.bullets.push({
                        x, y,
                        angle: angle + (Math.random() - 0.5) * 0.1,
                        speed: weaponType === 'uzi' ? 12 : 8,
                        life: 60,
                        owner,
                        color: owner === 'player' ? '#00d4ff' : '#ff3333',
                        size: weaponType === 'uzi' ? 3 : 4
                    });
                }
            }
            
            createParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 2;
                    this.simulatedGame.particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 30,
                        size: Math.random() * 4 + 2,
                        color
                    });
                }
            }
            
            drawCinematicBackground() {
                // Dark gradient background
                const gradient = ctx.createRadialGradient(640, 360, 0, 640, 360, 800);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#0a0a0a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1280, 720);
                
                // Grid effect
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
                ctx.lineWidth = 1;
                const gridOffset = (this.frameCount * 0.5) % 50;
                for (let i = -50; i < 1330; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i + gridOffset, 0);
                    ctx.lineTo(i + gridOffset, 720);
                    ctx.stroke();
                }
                for (let i = 0; i < 720; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(1280, i);
                    ctx.stroke();
                }
            }
            
            drawTitleCard(scene) {
                this.drawCinematicBackground();
                
                // Vignette effect
                const vignette = ctx.createRadialGradient(640, 360, 300, 640, 360, 700);
                vignette.addColorStop(0, 'transparent');
                vignette.addColorStop(1, 'rgba(0,0,0,0.8)');
                ctx.fillStyle = vignette;
                ctx.fillRect(0, 0, 1280, 720);
                
                // Main title
                ctx.save();
                ctx.translate(640, 320);
                ctx.scale(scene.zoom || 1, scene.zoom || 1);
                
                ctx.font = '900 80px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#00d4ff';
                ctx.strokeText(scene.text, 0, 0);
                ctx.fillStyle = '#fff';
                ctx.fillText(scene.text, 0, 0);
                
                // Glow effect
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 50;
                ctx.strokeText(scene.text, 0, 0);
                ctx.shadowBlur = 0;
                
                ctx.restore();
                
                // Subtitle
                ctx.font = '700 30px Rajdhani';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#00d4ff';
                ctx.fillText(scene.subtext, 640, 400);
                
                // Scanlines
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for (let i = 0; i < 720; i += 4) {
                    ctx.fillRect(0, i, 1280, 2);
                }
            }
            
            drawGameplay(scene) {
                this.updateGameplay();
                const game = this.simulatedGame;
                
                ctx.save();
                
                // Apply camera
                ctx.translate(640, 360);
                ctx.scale(this.camera.zoom, this.camera.zoom);
                ctx.translate(-640 + this.camera.x, -360 + this.camera.y);
                
                this.drawCinematicBackground();
                
                // Draw particles
                game.particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 30;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                
                // Draw bullets with trails
                game.bullets.forEach(b => {
                    ctx.strokeStyle = b.color;
                    ctx.lineWidth = b.size;
                    ctx.shadowColor = b.color;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y);
                    ctx.lineTo(b.x - Math.cos(b.angle) * 20, b.y - Math.sin(b.angle) * 20);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                });
                
                // Draw enemies
                game.enemies.forEach(e => {
                    ctx.fillStyle = e.color;
                    ctx.shadowColor = e.color;
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // Health bar
                    const barWidth = 50;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(e.x - barWidth/2, e.y - e.radius - 20, barWidth, 8);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(e.x - barWidth/2, e.y - e.radius - 20, barWidth * (e.health/e.maxHealth), 8);
                    
                    // Icon
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px Arial';
                    const icon = e.type === 'normal' ? '💰' : e.type === 'armed' ? '🔫' : e.type === 'uzi' ? '🔥' : '⚡';
                    ctx.fillText(icon, e.x - 10, e.y - e.radius - 30);
                });
                
                // Draw player
                ctx.fillStyle = '#00d4ff';
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(game.player.x, game.player.y, 25, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Weapon indicator
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Orbitron';
                ctx.fillText(game.player.weapon.toUpperCase(), game.player.x - 30, game.player.y - 40);
                
                ctx.restore();
                
                // HUD overlay (not affected by camera)
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(20, 20, 200, 80);
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.strokeRect(20, 20, 200, 80);
                
                ctx.fillStyle = '#00d4ff';
                ctx.font = '20px Orbitron';
                ctx.fillText(`LEVEL ${scene.level}`, 40, 50);
                ctx.fillText(`SCORE: ${game.score}`, 40, 80);
                
                // Scene description
                ctx.font = 'italic 24px Rajdhani';
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.textAlign = 'right';
                ctx.fillText(scene.description, 1260, 50);
                ctx.textAlign = 'left';
            }
            
            drawSlowMo(scene) {
                this.drawGameplay(scene);
                
                // Slow motion overlay
                ctx.fillStyle = 'rgba(0, 212, 255, 0.1)';
                ctx.fillRect(0, 0, 1280, 720);
                
                // Radial blur effect simulation
                const gradient = ctx.createRadialGradient(640, 360, 100, 640, 360, 600);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1280, 720);
                
                // Text
                ctx.font = '900 60px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 4;
                ctx.strokeText(scene.description, 640, 360);
                ctx.fillText(scene.description, 640, 360);
            }
            
            drawWeaponShowcase(scene) {
                this.drawCinematicBackground();
                
                // Weapon showcase animation
                const bob = Math.sin(this.frameCount * 0.05) * 20;
                const rotate = this.frameCount * 0.02;
                
                ctx.save();
                ctx.translate(640, 360 + bob);
                ctx.rotate(rotate);
                
                // Weapon glow
                const glowColor = scene.weapon === 'uzi' ? '#ff6600' : '#ff00ff';
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 50;
                
                // Weapon box
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.strokeStyle = glowColor;
                ctx.lineWidth = 5;
                ctx.fillRect(-100, -60, 200, 120);
                ctx.strokeRect(-100, -60, 200, 120);
                
                ctx.restore();
                
                // Weapon text
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 30;
                ctx.font = '900 50px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.fillText(scene.text, 640, 280);
                ctx.shadowBlur = 0;
                
                ctx.font = '700 28px Rajdhani';
                ctx.fillStyle = glowColor;
                ctx.fillText(scene.subtext, 640, 500);
                
                // Stats
                ctx.font = '20px Rajdhani';
                ctx.fillStyle = '#aaa';
                const stats = scene.weapon === 'uzi' ? 'FIRE RATE: EXTREME | DAMAGE: MEDIUM' : 'FIRE RATE: MEDIUM | DAMAGE: HIGH | SPREAD: 3X';
                ctx.fillText(stats, 640, 540);
            }
            
            drawBossIntro(scene) {
                this.drawCinematicBackground();
                
                // Warning flash
                if (this.frameCount % 30 < 15) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                    ctx.fillRect(0, 0, 1280, 720);
                }
                
                // Boss silhouette growing
                const scale = 0.5 + (this.frameCount / scene.duration) * 0.5;
                ctx.save();
                ctx.translate(640, 360);
                ctx.scale(scale, scale);
                
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 50;
                ctx.beginPath();
                ctx.arc(0, 0, 100, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                
                // Warning text
                ctx.font = '900 70px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff0000';
                if (this.frameCount % 20 < 10) {
                    ctx.fillText(scene.text, 640, 300);
                }
                
                ctx.font = '700 30px Orbitron';
                ctx.fillStyle = '#ff6666';
                ctx.fillText(scene.subtext, 640, 400);
            }
            
            drawMedalShowcase(scene) {
                this.drawCinematicBackground();
                
                const spacing = 200;
                const startX = 640 - ((scene.medals.length - 1) * spacing) / 2;
                
                scene.medals.forEach((medal, i) => {
                    const x = startX + i * spacing;
                    const y = 360;
                    const bob = Math.sin(this.frameCount * 0.05 + i) * 10;
                    const scale = 1 + Math.sin(this.frameCount * 0.03 + i) * 0.1;
                    
                    ctx.save();
                    ctx.translate(x, y + bob);
                    ctx.scale(scale, scale);
                    
                    // Glow
                    const colors = ['#cd7f32', '#c0c0c0', '#ffd700', '#b9f2ff'];
                    ctx.shadowColor = colors[i];
                    ctx.shadowBlur = 40;
                    
                    ctx.font = '80px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(medal, 0, 0);
                    
                    ctx.restore();
                });
                
                ctx.font = '900 50px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.fillText(scene.text, 640, 550);
            }
            
            drawTransition() {
                // Wipe transition
                const progress = (this.frameCount % 60) / 60;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 1280 * progress, 720);
            }
            
            loop() {
                if (!this.isPlaying) return;
                
                const scene = this.scenes[this.currentScene];
                
                // Clear
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 1280, 720);
                
                // Update camera
                this.updateCamera();
                
                // Draw scene based on type
                switch(scene.type) {
                    case 'title':
                        this.drawTitleCard(scene);
                        break;
                    case 'gameplay':
                        this.drawGameplay(scene);
                        break;
                    case 'slowmo':
                        this.drawSlowMo(scene);
                        break;
                    case 'weapon_showcase':
                        this.drawWeaponShowcase(scene);
                        break;
                    case 'boss_intro':
                        this.drawBossIntro(scene);
                        break;
                    case 'medal_showcase':
                        this.drawMedalShowcase(scene);
                        break;
                }
                
                // Transition effect at end of scene
                if (scene.duration - this.frameCount < 30) {
                    ctx.fillStyle = `rgba(0,0,0,${(30 - (scene.duration - this.frameCount)) / 30})`;
                    ctx.fillRect(0, 0, 1280, 720);
                }
                
                // Letterbox bars for cinematic feel
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 1280, 40);
                ctx.fillRect(0, 680, 1280, 40);
                
                // Update progress
                this.frameCount++;
                const totalFrames = this.scenes.reduce((sum, s) => sum + s.duration, 0);
                const currentTotal = this.scenes.slice(0, this.currentScene).reduce((sum, s) => sum + s.duration, 0) + this.frameCount;
                document.getElementById('progressBar').style.width = `${(currentTotal / totalFrames) * 100}%`;
                
                // Scene transition
                if (this.frameCount >= scene.duration) {
                    this.currentScene++;
                    this.frameCount = 0;
                    
                    if (this.currentScene >= this.scenes.length) {
                        this.endTrailer();
                        return;
                    }
                }
                
                requestAnimationFrame(this.loop);
            }
        }
        
        const trailer = new TrailerSystem();
        
        // Auto-play after 1 second
        setTimeout(() => {
            if (trailer.autoPlay) trailer.play();
        }, 1000);
    </script>
